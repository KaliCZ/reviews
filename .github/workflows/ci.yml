name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Reviews.slnx

      - name: Build
        run: dotnet build Reviews.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Reviews.slnx --configuration Release --no-build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,html,css,scss,json}"

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # ZITADEL writes admin-pat.txt into the bind-mounted secrets dir from
      # inside the container (UID 1000). If the dir doesn't exist on the host,
      # Docker auto-creates it as root and ZITADEL's bootstrap migration fails
      # with EACCES. Pre-creating with world-writable perms keeps both the
      # zitadel and zitadel-bootstrap containers happy without us having to
      # know their UIDs. Defaults match docker-compose.yml.
      - name: Prepare zitadel bind-mount dirs
        run: |
          mkdir -p "$HOME/.reviews-dev/zitadel-secrets" "$HOME/.reviews-dev/app-secrets"
          chmod 0777 "$HOME/.reviews-dev/zitadel-secrets" "$HOME/.reviews-dev/app-secrets"

      # Build and bring up the full compose stack; --wait blocks until every
      # service reports healthy. Playwright then runs against the running
      # web container (:4000), exactly the topology we deploy.
      - name: Start stack
        run: docker compose up -d --build --wait

      - name: Run Playwright
        working-directory: e2e
        run: npm test

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
