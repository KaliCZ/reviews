<header class="topbar">
  <a routerLink="/" class="brand">{{ 'nav.brand' | t }}</a>
  <nav class="auth">
    <app-language-toggle />
    <app-theme-toggle />
    @if (auth.authenticated()) {
      <span class="who">{{ 'nav.greeting' | t: { name: auth.displayName() ?? '' } }}</span>
      <a href="/auth/logout" class="link">{{ 'nav.signOut' | t }}</a>
    } @else {
      <a [href]="loginHref()" class="link">{{ 'nav.signIn' | t }}</a>
    }
  </nav>
</header>

<main class="container">
  <router-outlet />
</main>

<app-confirm-dialog />
