<header class="topbar">
  <a routerLink="/" class="brand">Reviews</a>
  <nav class="auth">
    @if (auth.authenticated()) {
      <span class="who">Hi, {{ auth.displayName() }}</span>
      <a href="/auth/logout" class="link">Sign out</a>
    } @else {
      <a [href]="loginHref()" class="link">Sign in</a>
    }
  </nav>
</header>

<main class="container">
  <router-outlet />
</main>
