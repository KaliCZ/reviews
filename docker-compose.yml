services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_MULTIPLE_DATABASES: reviews,zitadel,temporal,temporal_visibility
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"  # blob
      - "10001:10001"  # queue
      - "10002:10002"  # table
    volumes:
      - azurite-data:/data

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    # `--steps` runs the FirstInstance bootstrap (default org, admin user,
    # bootstrap service-account PAT) on first start of an empty zitadel DB.
    # See infra/zitadel/steps.yaml.
    command: start-from-init --masterkeyFromEnv --steps /steps.yaml
    environment:
      ZITADEL_MASTERKEY: MasterkeyNeedsToBe32Characters!!
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: "8080"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
    ports:
      - "8080:8080"
    volumes:
      - ./infra/zitadel/steps.yaml:/steps.yaml:ro
      # PAT lands here on first boot; consumed by zitadel-bootstrap below.
      # Bind-mount instead of named volume so the bootstrap output is visible
      # on the host (and shared with the Aspire run path). Resets via
      # `docker compose down -v` AND deleting infra/zitadel/.secrets/.
      - ./infra/zitadel/.secrets:/zitadel-secrets
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot init container: runs after zitadel is healthy, calls the mgmt API
  # with the bootstrap PAT, provisions the OIDC application + a test user,
  # and writes ZITADEL_ISSUER / ZITADEL_CLIENT_ID / ZITADEL_CLIENT_SECRET to
  # /app-secrets/zitadel.env. The api and web containers wait for this to
  # complete successfully before starting (depends_on: service_completed_successfully).
  zitadel-bootstrap:
    image: curlimages/curl:8.10.1
    user: "0:0"  # so the script can write into the named volume
    entrypoint: ["/bin/sh", "-c", "/bootstrap.sh"]
    environment:
      ZITADEL_INTERNAL_URL: http://zitadel:8080
      ZITADEL_PUBLIC_URL: http://localhost:8080
    volumes:
      - ./infra/zitadel/bootstrap.sh:/bootstrap.sh:ro
      # Bind-mount instead of named volume so the bootstrap output is visible
      # on the host (and shared with the Aspire run path). Resets via
      # `docker compose down -v` AND deleting infra/zitadel/.secrets/.
      - ./infra/zitadel/.secrets:/zitadel-secrets:ro
      - ./infra/zitadel/.app-secrets:/app-secrets
    depends_on:
      zitadel:
        condition: service_healthy
    restart: "no"

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
      ENABLE_ES: "false"
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "namespace", "describe", "--address", "temporal:7233", "-n", "default"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8233
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  worker:
    build:
      context: ./backend
      dockerfile: worker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__reviews: Host=postgres;Database=reviews;Username=postgres;Password=postgres;Search Path=reviews
      ConnectionStrings__cache: redis:6379
      ConnectionStrings__images: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      ConnectionStrings__temporal: temporal:7233
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/alive"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      azurite:
        condition: service_started
      temporal:
        condition: service_healthy
      # Worker queries the schema; API owns the migrations. Wait for API.
      api:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__reviews: Host=postgres;Database=reviews;Username=postgres;Password=postgres;Search Path=reviews
      ConnectionStrings__cache: redis:6379
      ConnectionStrings__images: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      ConnectionStrings__temporal: temporal:7233
      WEB_ORIGIN: http://localhost:4000
      # zitadel-bootstrap writes /run/secrets/zitadel.env with ZITADEL_ISSUER
      # = http://localhost:8080 (the public URL that ends up in iss claims).
      # JwtBearer can't actually reach that hostname from inside this
      # container, so we point it at the docker-internal URL for JWKS fetch.
      ZITADEL_METADATA_URL: http://zitadel:8080/.well-known/openid-configuration
      Auth__RequireHttps: "false"
    volumes:
      - ./infra/zitadel/.app-secrets:/run/secrets:ro
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/alive"]
      interval: 5s
      timeout: 3s
      retries: 30
      # First boot runs migrations + seeds 30+ images from picsum.photos to
      # Azurite, which can take ~30s on a cold cache. After that it's instant.
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      azurite:
        condition: service_started
      temporal:
        condition: service_healthy
      zitadel-bootstrap:
        condition: service_completed_successfully

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      API_URL: http://api:8080
      PORT: "4000"
      # BFF reads /run/secrets/zitadel.env via dotenv at startup. SESSION_SECRET
      # is a random string used to sign session cookies.
      SESSION_SECRET: dev-only-session-secret-rotate-in-prod-please
      REDIS_URL: redis://redis:6379
      # The BFF separates browser-facing OIDC URLs (where users redirect to
      # sign in) from server-facing ones (where the BFF exchanges the code
      # and fetches tokens). PUBLIC stays http://localhost:8080 so the
      # browser can resolve it; INTERNAL is http://zitadel:8080 so the
      # docker network handles the server-to-server traffic.
      ZITADEL_PUBLIC_URL: http://localhost:8080
      ZITADEL_INTERNAL_URL: http://zitadel:8080
    ports:
      - "4000:4000"
    volumes:
      - ./infra/zitadel/.app-secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      zitadel-bootstrap:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  azurite-data:
