services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_MULTIPLE_DATABASES: reviews,zitadel,temporal,temporal_visibility
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"  # blob
      - "10001:10001"  # queue
      - "10002:10002"  # table
    volumes:
      - azurite-data:/data

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    command: start-from-init --masterkeyFromEnv
    environment:
      ZITADEL_MASTERKEY: MasterkeyNeedsToBe32Characters!!
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: "8080"
      # Set TLS via env (not the --tlsMode CLI flag) so `zitadel ready` —
      # which reads config from env vars — picks it up too. Otherwise the
      # built-in healthcheck defaults to HTTPS and never goes green.
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
    ports:
      - "8080:8080"
    # The zitadel image is distroless, but ships its own readiness probe.
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
      ENABLE_ES: "false"
    ports:
      - "7233:7233"
    # auto-setup serves gRPC well before it has provisioned the `default`
    # namespace, so probing the namespace catches both the gRPC-not-listening
    # and namespace-not-yet-created races. Workers waiting on this become
    # ready only when Temporal can actually accept work.
    healthcheck:
      # temporal-server binds to the container's IP (not loopback), so the CLI
      # has to dial via Docker DNS — `temporal:7233` resolves inside the network.
      test: ["CMD", "temporal", "operator", "namespace", "describe", "--address", "temporal:7233", "-n", "default"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8233
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  worker:
    build:
      context: ./backend
      dockerfile: worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__reviews: Host=postgres;Database=reviews;Username=postgres;Password=postgres;Search Path=reviews
      ConnectionStrings__cache: redis:6379
      ConnectionStrings__images: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      ConnectionStrings__temporal: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      azurite:
        condition: service_started
      temporal:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__reviews: Host=postgres;Database=reviews;Username=postgres;Password=postgres;Search Path=reviews
      ConnectionStrings__cache: redis:6379
      ConnectionStrings__images: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      ConnectionStrings__temporal: temporal:7233
      WEB_ORIGIN: http://localhost:4000
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      azurite:
        condition: service_started
      temporal:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      API_URL: http://api:8080
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  azurite-data:
